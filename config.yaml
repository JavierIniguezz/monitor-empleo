# ══════════════════════════════════════════════════════════════════════════════
# config.yaml – Monitor de Empleo · Javier Íñiguez
# ══════════════════════════════════════════════════════════════════════════════
#
# CÓMO EDITAR ESTE ARCHIVO
# ─────────────────────────
# • Para añadir una fuente:   copia un bloque existente, cambia los valores.
# • Para desactivar una:      pon "activo: false" (sin borrarla).
# • Para añadir palabras clave: añádelas a la lista correspondiente.
# • Los # al inicio de línea son comentarios — el script los ignora.
#
# IMPORTANTE: respetar la indentación con espacios (no tabuladores).
# ══════════════════════════════════════════════════════════════════════════════


# ── PALABRAS CLAVE ────────────────────────────────────────────────────────────
# Periodismo = prioridad absoluta. Se muestra primero en el HTML.
# Comunicación = segunda opción.

keywords:

  periodismo:
    - journalist
    - reporter
    - redactor
    - redactora
    - corresponsal
    - correspondant
    - news producer
    - web producer
    - editor
    - periodista
    - anchor
    - presenter
    - foreign correspondent
    - news editor
    - digital editor
    - multimedia journalist
    - investigative journalist
    - political reporter
    - news writer
    - staff writer
    - content producer

  comunicacion:
    - communications officer
    - communications manager
    - communications specialist
    - communications associate
    - communications coordinator
    - press officer
    - press and communications
    - public affairs officer
    - public affairs specialist
    - media officer
    - information officer
    - oficial de prensa
    - oficial de comunicación
    - responsable de comunicación
    - técnico de comunicación
    - media relations


# ── EXCLUSIONES ───────────────────────────────────────────────────────────────
# Ofertas con estas palabras se descartan automáticamente.

exclusiones:

  # Sin becas, prácticas ni programas de formación
  - intern
  - internship
  - trainee
  - traineeship
  - "prácticas"
  - becario
  - becaria
  - fellowship
  - student
  - "graduate programme"
  - "graduate program"

  # Medios de ideología ultraderechista
  - okdiario
  - "libertad digital"
  - "epoch times"
  - breitbart
  - "daily wire"
  - "gateway pundit"
  # Nota: "vox" está excluido de la lista porque colisiona con VOA (Voice of America).
  # Se revisará manualmente si aparece algo de Vox el partido.


# ── FUENTES ───────────────────────────────────────────────────────────────────
# Organizadas por categoría. El orden aquí no afecta al HTML (Periodismo
# siempre va primero por las palabras clave, no por el orden de fuentes).

sources:

  # ── Agregadores generales (los más fiables) ───────────────────────────────
  agregadores:

    - name: "GIJN Jobs"
      type: rss
      feed: "https://gijn.org/jobs/feed/"
      url: "https://gijn.org/jobs/"
      activo: true

    - name: "GFMD Careers"
      type: rss
      feed: "https://gfmd.info/careers/feed/"
      url: "https://gfmd.info/careers/"
      activo: true

    - name: "UNjobs – Journalism"
      type: unjobs
      url: "https://unjobs.org/themes/journalism"
      activo: true

    - name: "UNjobs – Communications"
      type: unjobs
      url: "https://unjobs.org/themes/communications"
      activo: true

    - name: "Impactpool"
      type: impactpool
      url: "https://www.impactpool.org/search?q=journalist+reporter+communications"
      activo: true


  # ── ONG y libertad de prensa ──────────────────────────────────────────────
  ong_medios:

    - name: "CPJ"
      type: html
      url: "https://cpj.org/about/jobs/"
      activo: true
      selectors:
        item: "article, .job-listing, li"
        title: "h2 a, h3 a, a"

    - name: "ICFJ"
      type: html
      url: "https://www.icfj.org/about/jobs-icfj"
      activo: true
      selectors:
        item: "article, .views-row, li"
        title: "h2 a, h3 a, .field-title a, a"

    - name: "Free Press Unlimited"
      type: html
      url: "https://www.freepressunlimited.org/en/about-us/vacancies"
      activo: true
      selectors:
        item: "article, li, .job"
        title: "h2 a, h3 a, a"

    - name: "IMS (International Media Support)"
      type: html
      url: "https://www.mediasupport.org/about/vacancies/"
      activo: true
      selectors:
        item: "article, li, .job"
        title: "h2 a, h3 a, a"

    - name: "Amnistía Internacional"
      type: html
      url: "https://www.amnesty.org/en/about-us/jobs/"
      activo: true
      selectors:
        item: "article, li, .job"
        title: "h2 a, h3 a, a"


  # ── Agencias internacionales ──────────────────────────────────────────────
  agencias:

    - name: "Agencia EFE"
      type: html
      url: "https://piloota.com/es/empresa/efe/"
