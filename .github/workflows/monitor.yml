name: Monitor diario de empleo

on:
  schedule:
    # Lunes a viernes a las 7:00h hora Madrid (6:00 UTC en invierno, 5:00 en verano)
    # Para cambiar la hora: https://crontab.guru
    - cron: '0 6 * * 1-5'

  # Permite ejecutarlo manualmente desde la pestaña Actions en GitHub
  workflow_dispatch:

permissions:
  contents: write  # Necesario para que el bot pueda subir el index.html

jobs:
  monitorizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar monitor
        run: python monitor.py

      - name: Publicar index.html en GitHub Pages
        run: |
          git config user.name "Monitor Bot"
          git config user.email "bot@noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🔄 Actualización $(date +'%d/%m/%Y %H:%M')"
          git push
